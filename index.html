<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Arc90 — Build your next 90 days</title>
  <meta name="description" content="Turn one meaningful goal into a realistic daily system. Track the habits that matter, see where you're falling behind, and build momentum for the next 90 days." />

  <!-- iOS home-screen app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Arc90" />
  <meta name="theme-color" content="#03040a" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon-180.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <link rel="stylesheet" href="css/styles.css?v=81" />
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div id="splash" aria-hidden="true">
    <div class="splash-stage">
      <svg class="splash-arc" viewBox="0 0 200 200" fill="none">
        <defs><linearGradient id="splashGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c8c8c8"/><stop offset="1" stop-color="#ffffff"/></linearGradient></defs>
        <circle cx="100" cy="100" r="90" stroke="rgba(220,224,255,.08)" stroke-width="6"/>
        <circle class="splash-arc-fill" cx="100" cy="100" r="90" stroke="url(#splashGrad)" stroke-width="6" stroke-linecap="round" stroke-dasharray="565" stroke-dashoffset="565" transform="rotate(-90 100 100)"/>
      </svg>
      <div class="splash-mark">ARC<b>90</b></div>
    </div>
    <div class="splash-reflect">
      <span class="splash-reflect-label">Daily reflection</span>
      <blockquote id="splash-quote" class="splash-quote">Build your next 90 days.</blockquote>
      <div id="splash-source" class="splash-source"></div>
    </div>
    <span class="splash-skip">tap to continue</span>
  </div>

  <div id="app"></div>

  <!-- shared SVG defs: signature Arc90 gradient (violet analytics glow) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- mono/white-black theme ring -->
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#c8c8c8"/>
        <stop offset="100%" stop-color="#ffffff"/>
      </linearGradient>
      <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="donutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#c8c8c8"/>
        <stop offset="100%" stop-color="#ffffff"/>
      </linearGradient>
      <!-- original dark (aurora) theme ring -->
      <linearGradient id="ringGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#5ee4ff"/>
        <stop offset="48%" stop-color="#8f6bff"/>
        <stop offset="100%" stop-color="#c14cff"/>
      </linearGradient>
      <linearGradient id="areaGradDark" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#8f6bff" stop-opacity="0.36"/>
        <stop offset="100%" stop-color="#c14cff" stop-opacity="0"/>
      </linearGradient>
      <!-- light theme ring (dark on white) -->
      <linearGradient id="ringGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#444444"/>
        <stop offset="100%" stop-color="#111111"/>
      </linearGradient>
    </defs>
  </svg>

  <script src="js/data.js?v=81"></script>
  <script src="js/app.js?v=81"></script>
  <script>
    (function () {
      var sp = document.getElementById('splash');
      if (!sp) return;
      try {
        var q = (typeof reflectionQuote === 'function') ? reflectionQuote() : null;
        if (q && q.quote) {
          var qe = document.getElementById('splash-quote');
          var se = document.getElementById('splash-source');
          if (qe) qe.textContent = '“' + q.quote + '”';
          if (se && q.source) se.textContent = '— ' + q.source;
        }
      } catch (e) { /* keep default copy */ }
      var done = false;
      function hide() {
        if (done) return; done = true;
        sp.classList.add('hide');
        setTimeout(function () { if (sp.parentNode) sp.remove(); }, 400);
      }
      sp.addEventListener('click', hide);   // tap to continue early
      setTimeout(hide, 4000);               // otherwise auto-dismiss at 4s
    })();
  </script>
</body>
</html>
